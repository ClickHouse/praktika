          echo "::group::CI ENV"
          env | grep CI_ ||:
          echo "::endgroup::"
          echo "::group::GH ENV"
          env | grep GH_ ||:
          echo "::endgroup::"
          cat > /tmp/workflow_status.json << 'EOF'
          ${ toJson(needs) }
          EOF
          echo "PRAKTIKA_SETUP_STEP_EXIT_CODE=0" >> "$GITHUB_ENV"

      - name: Pre
        run: |
          set -o pipefail
          python3 -m praktika.runner --pre-run --job-name '''Finish Workflow''' --workflow-name "Example All IN" 2>&1 | tee /tmp/praktika/pre_run.log

      - name: Run
        id: run
        run: |
          set -o pipefail
          python3 -m praktika.runner --run --job-name '''Finish Workflow''' --workflow-name "Example All IN" 2>&1 | tee /tmp/praktika/run.log

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          set -o pipefail
          python3 -m praktika.runner --post-run --job-name '''Finish Workflow''' --workflow-name "Example All IN" 2>&1 | tee /tmp/praktika/post_run.log
