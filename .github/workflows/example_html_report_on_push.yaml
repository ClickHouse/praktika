# generated by praktika

name: Example HTML report on Push

on:
  push:
    branches: ['**']

env:
  # Force the stdout and stderr streams to be unbuffered
  PYTHONUNBUFFERED: 1

jobs:

  config_workflow:
    runs-on: [maxs-small-fixed]
    needs: []
    name: Config Workflow
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_with_gh_auth.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output /tmp/praktika/results
          echo "TEMP_DIR=$(readlink -f /tmp/praktika)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/praktika/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/praktika/output)" >> "$GITHUB_ENV"
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          python3 -m praktika.gh_auth
          echo '''${{ needs.config_workflow.outputs.data }}''' > /tmp/praktika/results/workflow_config_example_html_report_on_push.json
          cat /tmp/praktika/results/workflow_config_example_html_report_on_push.json
          echo "::group::GITHUB ENV"
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:
          echo "::endgroup::"
          echo "PRAKTIKA_STEP_ENV_OK=1" >> "$GITHUB_ENV"

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "Config Workflow" --workflow-name "Example HTML report on Push"
      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "Config Workflow" --workflow-name "Example HTML report on Push"

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          python -m praktika.runner --post-run --job-name "Config Workflow" --workflow-name "Example HTML report on Push"

  job_1:
    runs-on: [maxs-small-fixed]
    needs: [config_workflow]
    name: Job 1
    outputs:
      data: ${{ steps.run.outputs.DATA }}
