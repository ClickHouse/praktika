          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:
          echo "::endgroup::"
          echo "PRAKTIKA_STEP_ENV_OK=1" >> "$GITHUB_ENV"

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "Job 1" --workflow-name "Example HTML report on Push"
      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "Job 1" --workflow-name "Example HTML report on Push"

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          python -m praktika.runner --post-run --job-name "Job 1" --workflow-name "Example HTML report on Push"

  job_2:
