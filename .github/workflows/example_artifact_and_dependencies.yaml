  job_d_starting_after_job_c_is_done:
    runs-on: [ubuntu-latest]
    needs: [job_c_starting_after_job_a_and_b_is_done]
    name: "Job D starting after Job C is done"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
