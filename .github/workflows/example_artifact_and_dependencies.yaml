          echo "::group::GH ENV"
          env | grep GH_ ||:
          echo "::endgroup::"
          echo "PRAKTIKA_SETUP_STEP_EXIT_CODE=0" >> "$GITHUB_ENV"

      - name: Download artifact greet
        uses: actions/download-artifact@v4
        with:
          name: greet
          path: /tmp/praktika/input

      - name: Pre
        run: |
          set -o pipefail
          python -m praktika.runner --pre-run --job-name '''Consume Artifact''' --workflow-name "Example Artifact And Dependencies" 2>&1 | tee /tmp/praktika/pre_run.log

      - name: Run
        id: run
        run: |
          set -o pipefail
          python -m praktika.runner --run --job-name '''Consume Artifact''' --workflow-name "Example Artifact And Dependencies" 2>&1 | tee /tmp/praktika/run.log

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          set -o pipefail
          python -m praktika.runner --post-run --job-name '''Consume Artifact''' --workflow-name "Example Artifact And Dependencies" 2>&1 | tee /tmp/praktika/post_run.log

