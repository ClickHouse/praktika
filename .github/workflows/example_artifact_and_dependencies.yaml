# generated by praktika

name: Example Artifact And Dependencies

on:
  pull_request:
    branches: ['main']

# Cancel the previous wf run in PRs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force the stdout and stderr streams to be unbuffered
  PYTHONUNBUFFERED: 1

jobs:

  provide_artifact:
    runs-on: [ubuntu-latest]
    needs: []
    name: Provide Artifact
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output /tmp/praktika/results
          echo "TEMP_DIR=$(readlink -f /tmp/praktika)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/praktika/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/praktika/output)" >> "$GITHUB_ENV"
          echo "JOB_NAME=Provide Artifact" >> "$GITHUB_ENV"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          if [ -n '''${{ needs.config_workflow.outputs.data }}''' ]; then
            # normal job case
            echo '''${{ needs.config_workflow.outputs.data }}''' > /tmp/praktika/results/workflow_config_example_artifact_and_dependencies.json
          else
            # nested job case
            echo '''${{ inputs.config }}''' > /tmp/praktika/results/workflow_config_example_artifact_and_dependencies.json
          fi
          cat /tmp/praktika/results/workflow_config_example_artifact_and_dependencies.json
          echo "::group::GITHUB ENV"
          env | grep GITHUB ||:
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:
          echo "::endgroup::"
          echo "::group::CI ENV"
          env | grep CI_ ||:
          echo "::endgroup::"
          echo "::group::GH ENV"
          env | grep GH_ ||:
          echo "::endgroup::"
          echo "PRAKTIKA_SETUP_STEP_EXIT_CODE=0" >> "$GITHUB_ENV"

      - name: Pre
        run: |
          set -o pipefail
          python -m praktika.runner --pre-run --job-name '''Provide Artifact''' --workflow-name "Example Artifact And Dependencies" 2>&1 | tee /tmp/praktika/pre_run.log

      - name: Run
        id: run
        run: |
          set -o pipefail
          python -m praktika.runner --run --job-name '''Provide Artifact''' --workflow-name "Example Artifact And Dependencies" 2>&1 | tee /tmp/praktika/run.log

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          set -o pipefail
          python -m praktika.runner --post-run --job-name '''Provide Artifact''' --workflow-name "Example Artifact And Dependencies" 2>&1 | tee /tmp/praktika/post_run.log

      - name: Upload artifact greet
        uses: actions/upload-artifact@v4
        with:
          name: greet
          path: ./hello_world.txt

  consume_artifact:
    runs-on: [ubuntu-latest]
    needs: [provide_artifact]
    name: Consume Artifact
    outputs:
