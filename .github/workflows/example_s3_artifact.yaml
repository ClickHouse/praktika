name: Example S3 Artifact

on:
  pull_request:
    branches:
      - main

jobs:

  provide_artifact:
    runs-on: [maxs-small]
    needs: []
    name: Provide Artifact
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up env
        run: |
          rm -rf ~/tmp_ci/input ~/tmp_ci/output ~/tmp_ci
          mkdir -p ~/tmp_ci ~/tmp_ci/input ~/tmp_ci/output
          echo "TEMP_DIR=$(readlink -f ~/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f ~/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f ~/tmp_ci/output)" >> "$GITHUB_ENV"
          env | grep GITHUB

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          #pip install recurcipy

      - name: Pre
        run: |
          python -m recurcipy.runner --pre-run --job-name "Provide Artifact" --workflow-name "Example S3 Artifact"

      - name: Run
        run: |
          python -m recurcipy.runner --run --job-name "Provide Artifact" --workflow-name "Example S3 Artifact"

      - name: Post
        run: |
          python -m recurcipy.runner --post-run --job-name "Provide Artifact" --workflow-name "Example S3 Artifact"

  consume_artifact:
    runs-on: [maxs-small]
    needs: [provide_artifact]
    name: Consume Artifact
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up env
        run: |
          rm -rf ~/tmp_ci/input ~/tmp_ci/output ~/tmp_ci
          mkdir -p ~/tmp_ci ~/tmp_ci/input ~/tmp_ci/output
          echo "TEMP_DIR=$(readlink -f ~/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f ~/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f ~/tmp_ci/output)" >> "$GITHUB_ENV"
          env | grep GITHUB

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          #pip install recurcipy

      - name: Pre
        run: |
          python -m recurcipy.runner --pre-run --job-name "Consume Artifact" --workflow-name "Example S3 Artifact"

      - name: Run
        run: |
          python -m recurcipy.runner --run --job-name "Consume Artifact" --workflow-name "Example S3 Artifact"

      - name: Post
        run: |
          python -m recurcipy.runner --post-run --job-name "Consume Artifact" --workflow-name "Example S3 Artifact"
