# generated by praktika

name: Example Dispatch
on:
  workflow_dispatch:
    inputs:
      user_name:
        description: User Name
        required: true
        default: ''
      user_age:
        description: User Age
        required: false
        default: 0

env:
  PYTHONUNBUFFERED: 1

jobs:

  hello_user_name:
    runs-on: [maxs-small-fixed]
    needs: []
    name: "Hello User Name"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt install -y python3-pip
          # TODO: --break-system-packages? otherwise ubuntu's apt/apt-get complains
          python3 -m pip install --upgrade pip --break-system-packages
          pip3 install -r ./ci/requirements.txt --break-system-packages

      - name: Prepare env script
        run: |
          rm -rf ./ci/tmp ./ci/tmp ./ci/tmp
          mkdir -p ./ci/tmp ./ci/tmp ./ci/tmp
          cat > ./ci/tmp/praktika_setup_env.sh << 'ENV_SETUP_SCRIPT_EOF'
          export PYTHONPATH=./ci:.
          cat > ./ci/tmp/workflow_inputs.json << 'EOF'
          ${{ toJson(github.event.inputs) }}
          EOF
          cat > ./ci/tmp/workflow_status.json << 'EOF'
          ${{ toJson(needs) }}
          EOF
          ENV_SETUP_SCRIPT_EOF

      - name: Run
        id: run
        run: |
          . ./ci/tmp/praktika_setup_env.sh
          set -o pipefail
          if command -v ts &> /dev/null; then
            python3 -m praktika run 'Hello User Name' --workflow "Example Dispatch" --ci |& ts '[%Y-%m-%d %H:%M:%S]' | tee ./ci/tmp/praktika_run.log
          else
            python3 -m praktika run 'Hello User Name' --workflow "Example Dispatch" --ci |& tee ./ci/tmp/praktika_run.log
          fi
