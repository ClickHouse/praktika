# generated by praktika

name: Example Merge ready Status, HTML

on:
  pull_request:
    branches: ['main']

env:
  # Force the stdout and stderr streams to be unbuffered
  PYTHONUNBUFFERED: 1

jobs:

  config_workflow:
    runs-on: [maxs-small-fixed]
    needs: []
    name: null
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_with_gh_auth.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output /tmp/praktika/results
          echo "TEMP_DIR=$(readlink -f /tmp/praktika)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/praktika/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/praktika/output)" >> "$GITHUB_ENV"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          cat >> "$GITHUB_ENV" << 'EOF'
          GH_APP_ID<<MULTILINE_SECRET_SUPPORT
          ${{ secrets.GH_APP_ID }}
          MULTILINE_SECRET_SUPPORT
          EOF
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          cat >> "$GITHUB_ENV" << 'EOF'
          GH_APP_PEM_KEY<<MULTILINE_SECRET_SUPPORT
          ${{ secrets.GH_APP_PEM_KEY }}
          MULTILINE_SECRET_SUPPORT
          EOF
          python3 -m praktika.gh_auth
          echo '''${{ needs.config_workflow.outputs.data }}''' > /tmp/praktika/results/workflow_config_example_merge_ready_status__html.json
          cat /tmp/praktika/results/workflow_config_example_merge_ready_status__html.json
          echo "::group::GITHUB ENV"
          env | grep GITHUB ||:
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:
          echo "::endgroup::"
          echo "::group::CI ENV"
          env | grep CI_ ||:
          echo "::endgroup::"
          echo "::group::GH ENV"
          env | grep GH_ ||:
          echo "::endgroup::"
          echo "PRAKTIKA_SETUP_STEP_EXIT_CODE=0" >> "$GITHUB_ENV"

      - name: Pre
        run: |
          set -o pipefail
          python -m praktika.runner --pre-run --job-name "Config Workflow" --workflow-name "Example Merge ready Status, HTML" 2>&1 | tee /tmp/praktika/pre_run.log

      - name: Run
        id: run
        run: |
          set -o pipefail
          python -m praktika.runner --run --job-name "Config Workflow" --workflow-name "Example Merge ready Status, HTML" 2>&1 | tee /tmp/praktika/run.log

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          set -o pipefail
          python -m praktika.runner --post-run --job-name "Config Workflow" --workflow-name "Example Merge ready Status, HTML" 2>&1 | tee /tmp/praktika/post_run.log

