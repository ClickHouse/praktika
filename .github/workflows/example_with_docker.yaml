# generated by praktika

name: Example with Docker

on:
  pull_request:
    branches: ['main']

env:
  # Force the stdout and stderr streams to be unbuffered
  PYTHONUNBUFFERED: 1

jobs:

  workflowconfig:
    runs-on: [maxs-small-fixed]
    needs: []
    name: WorkflowConfig
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_with_gh_auth.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output /tmp/praktika/results
          echo "TEMP_DIR=$(readlink -f /tmp/praktika)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/praktika/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/praktika/output)" >> "$GITHUB_ENV"
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          python3 -m praktika.gh_auth
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/praktika/results/workflow_config_example_with_docker.json
          cat /tmp/praktika/results/workflow_config_example_with_docker.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "WorkflowConfig" --workflow-name "Example with Docker"

      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "WorkflowConfig" --workflow-name "Example with Docker"

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          python -m praktika.runner --post-run --job-name "WorkflowConfig" --workflow-name "Example with Docker"

  dockerbuilds:
    runs-on: [maxs-small-fixed]
    needs: [workflowconfig]
    if: ${{ !failure() && !cancelled() && !contains(fromJson(needs.workflowconfig.outputs.data).cache_success, 'DockerBuilds') }}
    name: DockerBuilds
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Set up env
        run: |
          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output /tmp/praktika/results
          echo "TEMP_DIR=$(readlink -f /tmp/praktika)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/praktika/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/praktika/output)" >> "$GITHUB_ENV"
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          python3 -m praktika.gh_auth
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/praktika/results/workflow_config_example_with_docker.json
          cat /tmp/praktika/results/workflow_config_example_with_docker.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "DockerBuilds" --workflow-name "Example with Docker"

      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "DockerBuilds" --workflow-name "Example with Docker"

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          python -m praktika.runner --post-run --job-name "DockerBuilds" --workflow-name "Example with Docker"

  some_job_to_run_in_docker:
    runs-on: [maxs-small-fixed]
    needs: [workflowconfig, dockerbuilds]
    if: ${{ !failure() && !cancelled() && !contains(fromJson(needs.workflowconfig.outputs.data).cache_success, 'Some Job to run in docker') }}
    name: Some Job to run in docker
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output /tmp/praktika/results
          echo "TEMP_DIR=$(readlink -f /tmp/praktika)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/praktika/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/praktika/output)" >> "$GITHUB_ENV"
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          python3 -m praktika.gh_auth
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/praktika/results/workflow_config_example_with_docker.json
          cat /tmp/praktika/results/workflow_config_example_with_docker.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "Some Job to run in docker" --workflow-name "Example with Docker"

      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "Some Job to run in docker" --workflow-name "Example with Docker"

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          python -m praktika.runner --post-run --job-name "Some Job to run in docker" --workflow-name "Example with Docker"
