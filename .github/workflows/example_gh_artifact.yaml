# generated by praktika

name: Example GH Artifact

on:
  pull_request:
    branches: [main]

env:
  # Force the stdout and stderr streams to be unbuffered
  PYTHONUNBUFFERED: 1

jobs:

  provide_artifact:
    runs-on: [ubuntu-latest]
    needs: []
    name: Provide Artifact
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci
          mkdir -p /tmp/tmp_ci /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci/results
          echo "TEMP_DIR=$(readlink -f /tmp/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/tmp_ci/output)" >> "$GITHUB_ENV"
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/tmp_ci/workflow_config.json
          cat /tmp/tmp_ci/workflow_config.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "Provide Artifact" --workflow-name "Example GH Artifact"

      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "Provide Artifact" --workflow-name "Example GH Artifact"

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          python -m praktika.runner --post-run --job-name "Provide Artifact" --workflow-name "Example GH Artifact"

      - name: Upload artifact greet
        uses: actions/upload-artifact@v4
        with:
          name: greet
          path: ./hello_world.txt

  consume_artifact:
    runs-on: [ubuntu-latest]
    needs: [provide_artifact]
    name: Consume Artifact
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci
          mkdir -p /tmp/tmp_ci /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci/results
          echo "TEMP_DIR=$(readlink -f /tmp/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/tmp_ci/output)" >> "$GITHUB_ENV"
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/tmp_ci/workflow_config.json
          cat /tmp/tmp_ci/workflow_config.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Download artifact greet
        uses: actions/download-artifact@v4
        with:
          name: greet
          path: /tmp/tmp_ci/input

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "Consume Artifact" --workflow-name "Example GH Artifact"

      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "Consume Artifact" --workflow-name "Example GH Artifact"

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          python -m praktika.runner --post-run --job-name "Consume Artifact" --workflow-name "Example GH Artifact"
