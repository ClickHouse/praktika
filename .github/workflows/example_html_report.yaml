name: Example HTML report

on:
  pull_request:
    branches: [main]

jobs:

  workflowconfig:
    runs-on: [maxs-small-fixed]
    needs: []
    name: WorkflowConfig
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_config.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci
          mkdir -p /tmp/tmp_ci /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci/results
          echo "TEMP_DIR=$(readlink -f /tmp/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/tmp_ci/output)" >> "$GITHUB_ENV"
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          python3 -m praktika.gh_auth
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/tmp_ci/workflow_config.json
          cat /tmp/tmp_ci/workflow_config.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "WorkflowConfig" --workflow-name "Example HTML report"

      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "WorkflowConfig" --workflow-name "Example HTML report"

      - name: Post
        run: |
          python -m praktika.runner --post-run --job-name "WorkflowConfig" --workflow-name "Example HTML report"

  job_1:
    runs-on: [maxs-small-fixed]
    needs: [workflowconfig]
    name: Job 1
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci
          mkdir -p /tmp/tmp_ci /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci/results
          echo "TEMP_DIR=$(readlink -f /tmp/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/tmp_ci/output)" >> "$GITHUB_ENV"
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/tmp_ci/workflow_config.json
          cat /tmp/tmp_ci/workflow_config.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "Job 1" --workflow-name "Example HTML report"

      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "Job 1" --workflow-name "Example HTML report"

      - name: Post
        run: |
          python -m praktika.runner --post-run --job-name "Job 1" --workflow-name "Example HTML report"

  job_2:
    runs-on: [maxs-small-fixed]
    needs: [workflowconfig, job_1]
    name: Job 2
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci
          mkdir -p /tmp/tmp_ci /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci/results
          echo "TEMP_DIR=$(readlink -f /tmp/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/tmp_ci/output)" >> "$GITHUB_ENV"
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/tmp_ci/workflow_config.json
          cat /tmp/tmp_ci/workflow_config.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "Job 2" --workflow-name "Example HTML report"

      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "Job 2" --workflow-name "Example HTML report"

      - name: Post
        run: |
          python -m praktika.runner --post-run --job-name "Job 2" --workflow-name "Example HTML report"
