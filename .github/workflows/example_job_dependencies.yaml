          echo "TEMP_DIR=$(readlink -f /tmp/praktika)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/praktika/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/praktika/output)" >> "$GITHUB_ENV"
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/praktika/results/workflow_config_example_job_dependencies.json
          cat /tmp/praktika/results/workflow_config_example_job_dependencies.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Pre
        run: |
          python -m praktika.runner --pre-run --job-name "Job C starting after Job A and B is done" --workflow-name "Example Job Dependencies"

      - name: Run
        id: run
        run: |
          python -m praktika.runner --run --job-name "Job C starting after Job A and B is done" --workflow-name "Example Job Dependencies"

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          python -m praktika.runner --post-run --job-name "Job C starting after Job A and B is done" --workflow-name "Example Job Dependencies"

  job_d_starting_after_job_c_is_done:
    runs-on: [ubuntu-latest]
    needs: [job_c_starting_after_job_a_and_b_is_done]
    name: Job D starting after Job C is done
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
