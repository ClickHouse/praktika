# generated by praktika

name: GHActions Dispatch Workflow
concurrency:
  group: ${{ github.workflow }}
on:
  workflow_dispatch:
    inputs:
      user_name:
        description: User Name
        required: true
        default: ''
      user_age:
        description: User Age
        required: false
        default: 0
  workflow_call:
    inputs:
      user_name:
        description: User Name
        required: true
        type: string
        default: ''
      user_age:
        description: User Age
        required: false
        type: string
        default: 0

env:
  PYTHONUNBUFFERED: 1
  CHECKOUT_REF: ""

# Allow updating GH commit statuses and PR comments to post an actual job reports link
permissions: write-all

jobs:

  hello_user_name:
    runs-on: [arm-2xsmall]
    needs: []
    name: "Hello User Name"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
      pipeline_status: ${{ steps.run.outputs.pipeline_status || 'undefined' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - name: Prepare env script
        run: |
          rm -rf ./ci/tmp
          mkdir -p ./ci/tmp
          cat > ./ci/tmp/praktika_setup_env.sh << 'ENV_SETUP_SCRIPT_EOF'
          export PYTHONPATH=.:./ci
          cat > ./ci/tmp/workflow_inputs.json << 'EOF'
          ${{ toJson(inputs) }}
          EOF
          cat > ./ci/tmp/workflow_job.json << 'EOF'
          ${{ toJson(job) }}
          EOF
          cat > ./ci/tmp/workflow_status.json << 'EOF'
          ${{ toJson(needs) }}
          EOF
          ENV_SETUP_SCRIPT_EOF

      - name: Run
        id: run
        run: |
          . ./ci/tmp/praktika_setup_env.sh
          PYTHONUNBUFFERED=1 python3 -m praktika run 'Hello User Name' --workflow "GHActions Dispatch Workflow" --ci --timestamp
