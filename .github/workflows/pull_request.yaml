
name: Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  GenerateYaml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          #pip install recurcipy

      - name: Generate yaml
        run: |
          python -m recurcipy
