name: Pull Request

on:
  pull_request:
    branches:
      - main

jobs:

  Hello_World:
    needs: []
    uses: ./.github/workflows/aux_job_py.yaml
    with:
      job_name: Hello_World
      requirements_txt: requirements.txt

  Hello_RecurCIPY:
    needs: [Hello_World]
    uses: ./.github/workflows/aux_job_py.yaml
    with:
      job_name: Hello_RecurCIPY
      requirements_txt: requirements.txt

  Yaml_Lint:
    needs: [Hello_RecurCIPY]
    uses: ./.github/workflows/aux_job_py.yaml
    with:
      job_name: Yaml_Lint
      requirements_txt: requirements.txt
