# generated by praktika

name: Library PR CI

on:
  pull_request:
    branches: ['main']

env:
  # Force the stdout and stderr streams to be unbuffered
  PYTHONUNBUFFERED: 1

jobs:

  unit_tests:
    runs-on: [ubuntu-latest]
    needs: []
    name: Unit Tests
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          #pip install praktika

      - name: Set up env
        run: |
          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output /tmp/praktika/results
          echo "TEMP_DIR=$(readlink -f /tmp/praktika)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/praktika/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/praktika/output)" >> "$GITHUB_ENV"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          echo '''${{ needs.config_workflow.outputs.data }}''' > /tmp/praktika/results/workflow_config_library_pr_ci.json
          cat /tmp/praktika/results/workflow_config_library_pr_ci.json
          echo "::group::GITHUB ENV"
          env | grep GITHUB ||:
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:
          echo "::endgroup::"
          echo "::group::CI ENV"
          env | grep CI_ ||:
          echo "::endgroup::"
          echo "::group::GH ENV"
          env | grep GH_ ||:
          echo "::endgroup::"
          echo "PRAKTIKA_SETUP_STEP_EXIT_CODE=0" >> "$GITHUB_ENV"

      - name: Pre
        run: |
          set -o pipefail
          python -m praktika.runner --pre-run --job-name '''Unit Tests''' --workflow-name "Library PR CI" 2>&1 | tee /tmp/praktika/pre_run.log

      - name: Run
        id: run
        run: |
          set -o pipefail
          python -m praktika.runner --run --job-name '''Unit Tests''' --workflow-name "Library PR CI" 2>&1 | tee /tmp/praktika/run.log

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          set -o pipefail
          python -m praktika.runner --post-run --job-name '''Unit Tests''' --workflow-name "Library PR CI" 2>&1 | tee /tmp/praktika/post_run.log

  yaml_lint:
    runs-on: [ubuntu-latest]
