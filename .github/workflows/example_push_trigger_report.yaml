# generated by praktika

name: Example Push trigger, Report

on:
  push:
    branches: ['**']

# Cancel the previous wf run in PRs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force the stdout and stderr streams to be unbuffered
  PYTHONUNBUFFERED: 1
  GH_TOKEN: ${{ github.token }}

# Allow updating GH commit statuses and PR comments to post an actual job reports link
permissions: write-all

jobs:

  config_workflow:
    runs-on: [maxs-small-fixed]
    needs: []
    name: "Config Workflow"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt install -y python3-pip
          # TODO: --break-system-packages? otherwise ubuntu's apt/apt-get complains
          python3 -m pip install --upgrade pip --break-system-packages
          pip3 install -r ./ci/requirements.txt --break-system-packages

      - name: Prepare env script
        run: |
          cat > /tmp/praktika_setup_env.sh << 'ENV_SETUP_SCRIPT_EOF'

          cat > /tmp/praktika/workflow_config_example_push_trigger_report.json << 'EOF'
          ${{ needs.config_workflow.outputs.data }}
          EOF
          cat > /tmp/praktika/workflow_status.json << 'EOF'
          ${{ toJson(needs) }}
          EOF
          ENV_SETUP_SCRIPT_EOF

          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output

      - name: Run
        id: run
        run: |
          set -o pipefail
          python3 -m praktika.runner --job-name '''Config Workflow''' --workflow-name "Example Push trigger, Report" |& tee /tmp/praktika/praktika_run.log

  job_1:
    runs-on: [maxs-small-fixed]
    needs: [config_workflow]
    name: "Job 1"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt install -y python3-pip
          # TODO: --break-system-packages? otherwise ubuntu's apt/apt-get complains
          python3 -m pip install --upgrade pip --break-system-packages
          pip3 install -r ./ci/requirements.txt --break-system-packages

      - name: Prepare env script
        run: |
          cat > /tmp/praktika_setup_env.sh << 'ENV_SETUP_SCRIPT_EOF'

          cat > /tmp/praktika/workflow_config_example_push_trigger_report.json << 'EOF'
          ${{ needs.config_workflow.outputs.data }}
          EOF
          cat > /tmp/praktika/workflow_status.json << 'EOF'
          ${{ toJson(needs) }}
          EOF
          ENV_SETUP_SCRIPT_EOF

          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output

      - name: Run
        id: run
        run: |
          set -o pipefail
          python3 -m praktika.runner --job-name '''Job 1''' --workflow-name "Example Push trigger, Report" |& tee /tmp/praktika/praktika_run.log

  job_2:
    runs-on: [maxs-small-fixed]
    needs: [config_workflow, job_1]
    name: "Job 2"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt install -y python3-pip
          # TODO: --break-system-packages? otherwise ubuntu's apt/apt-get complains
          python3 -m pip install --upgrade pip --break-system-packages
          pip3 install -r ./ci/requirements.txt --break-system-packages

      - name: Prepare env script
        run: |
          cat > /tmp/praktika_setup_env.sh << 'ENV_SETUP_SCRIPT_EOF'

          cat > /tmp/praktika/workflow_config_example_push_trigger_report.json << 'EOF'
          ${{ needs.config_workflow.outputs.data }}
          EOF
          cat > /tmp/praktika/workflow_status.json << 'EOF'
          ${{ toJson(needs) }}
          EOF
          ENV_SETUP_SCRIPT_EOF

          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output

      - name: Run
        id: run
        run: |
          set -o pipefail
          python3 -m praktika.runner --job-name '''Job 2''' --workflow-name "Example Push trigger, Report" |& tee /tmp/praktika/praktika_run.log
