          for line in sys.stdin: sys.stdout.write(prefix() + " " + line); sys.stdout.flush()' | tee ./ci/tmp/job.log

  job_d_starting_after_job_c_is_done:
    runs-on: [ubuntu-latest]
    needs: [job_a_starting_at_the_beginning, job_b_starting_at_the_beginning, job_c_starting_after_job_a_and_b_is_done]
