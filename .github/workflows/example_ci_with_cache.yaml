name: Example CI with Cache

on:
  pull_request:
    branches: [main]

jobs:

  workflowconfig:
    runs-on: [maxs-small-fixed]
    needs: []
    name: WorkflowConfig
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up env
        run: |
          rm -rf /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci
          mkdir -p /tmp/tmp_ci /tmp/tmp_ci/input /tmp/tmp_ci/output
          echo "TEMP_DIR=$(readlink -f /tmp/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/tmp_ci/output)" >> "$GITHUB_ENV"
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/workflow_config.json
          cat /tmp/workflow_config.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Pre
        run: |
          python -m recurcipy.runner --pre-run --job-name "WorkflowConfig" --workflow-name "Example CI with Cache"

      - name: Run
        id: run
        run: |
          python -m recurcipy.runner --run --job-name "WorkflowConfig" --workflow-name "Example CI with Cache"

      - name: Post
        run: |
          python -m recurcipy.runner --post-run --job-name "WorkflowConfig" --workflow-name "Example CI with Cache"

  job_a:
    runs-on: [maxs-small-fixed]
    needs: [workflowconfig]
    if: ${{ !failure() && !cancelled() && !contains(fromJson(needs.workflowconfig.outputs.data).cache_success, 'Job A') }}
    name: Job A
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up env
        run: |
          rm -rf /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci
          mkdir -p /tmp/tmp_ci /tmp/tmp_ci/input /tmp/tmp_ci/output
          echo "TEMP_DIR=$(readlink -f /tmp/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/tmp_ci/output)" >> "$GITHUB_ENV"
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/workflow_config.json
          cat /tmp/workflow_config.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt
          #pip install recurcipy

      - name: Pre
        run: |
          python -m recurcipy.runner --pre-run --job-name "Job A" --workflow-name "Example CI with Cache"

      - name: Run
        id: run
        run: |
          python -m recurcipy.runner --run --job-name "Job A" --workflow-name "Example CI with Cache"

      - name: Post
        run: |
          python -m recurcipy.runner --post-run --job-name "Job A" --workflow-name "Example CI with Cache"

  job_b:
    runs-on: [maxs-small-fixed]
    needs: [workflowconfig, job_a]
    if: ${{ !failure() && !cancelled() && !contains(fromJson(needs.workflowconfig.outputs.data).cache_success, 'Job B') }}
    name: Job B
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up env
        run: |
          rm -rf /tmp/tmp_ci/input /tmp/tmp_ci/output /tmp/tmp_ci
          mkdir -p /tmp/tmp_ci /tmp/tmp_ci/input /tmp/tmp_ci/output
          echo "TEMP_DIR=$(readlink -f /tmp/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/tmp_ci/output)" >> "$GITHUB_ENV"
          echo '''${{ needs.workflowconfig.outputs.data }}''' > /tmp/workflow_config.json
          cat /tmp/workflow_config.json
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt
          #pip install recurcipy

      - name: Pre
        run: |
          python -m recurcipy.runner --pre-run --job-name "Job B" --workflow-name "Example CI with Cache"

      - name: Run
        id: run
        run: |
          python -m recurcipy.runner --run --job-name "Job B" --workflow-name "Example CI with Cache"

      - name: Post
        run: |
          python -m recurcipy.runner --post-run --job-name "Job B" --workflow-name "Example CI with Cache"
