      - name: Post
        if: ${{ !cancelled() }}
        run: |
          set -o pipefail
          python -m praktika.runner --post-run --job-name '''Job A''' --workflow-name "Example CI with Cache" 2>&1 | tee /tmp/praktika/post_run.log

  job_b:
