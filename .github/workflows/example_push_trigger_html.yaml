          echo '''${{ needs.config_workflow.outputs.data }}''' > /tmp/praktika/results/workflow_config_example_push_trigger_html.json
          cat /tmp/praktika/results/workflow_config_example_push_trigger_html.json
          echo "::group::GITHUB ENV"
          env | grep GITHUB ||:
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:
          echo "::endgroup::"
          echo "::group::CI ENV"
          env | grep CI_ ||:
          echo "::endgroup::"
          echo "::group::GH ENV"
          env | grep GH_ ||:
          echo "::endgroup::"
          cat > /tmp/workflow_status.json << 'EOF'
          ${ toJson(needs) }
          EOF
          echo "PRAKTIKA_SETUP_STEP_EXIT_CODE=0" >> "$GITHUB_ENV"

      - name: Pre
        run: |
          set -o pipefail
          python3 -m praktika.runner --pre-run --job-name '''Job 1''' --workflow-name "Example Push trigger, HTML" 2>&1 | tee /tmp/praktika/pre_run.log

      - name: Run
        id: run
        run: |
          set -o pipefail
          python3 -m praktika.runner --run --job-name '''Job 1''' --workflow-name "Example Push trigger, HTML" 2>&1 | tee /tmp/praktika/run.log

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          set -o pipefail
          python3 -m praktika.runner --post-run --job-name '''Job 1''' --workflow-name "Example Push trigger, HTML" 2>&1 | tee /tmp/praktika/post_run.log

  job_2:
    runs-on: [maxs-small-fixed]
    needs: [config_workflow, job_1]
    name: "Job 2"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
