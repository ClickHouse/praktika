          echo '''${{ needs.config_workflow.outputs.data }}''' > /tmp/praktika/results/workflow_config_example_push_trigger_html.json
          cat /tmp/praktika/results/workflow_config_example_push_trigger_html.json
          echo "::group::GITHUB ENV"
          env | grep GITHUB ||:
