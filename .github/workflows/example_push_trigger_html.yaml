# generated by praktika

name: Example Push trigger, HTML

on:
  push:
    branches: ['**']

# Cancel the previous wf run in PRs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force the stdout and stderr streams to be unbuffered
  PYTHONUNBUFFERED: 1

jobs:

  config_workflow:
    runs-on: [maxs-small-fixed]
    needs: []
    name: "Config Workflow"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          # TODO: --break-system-packages?
          pip3 install -r ./ci/requirements.txt --break-system-packages

      - name: Set up env
        run: |
          rm -rf /tmp/praktika/input /tmp/praktika/output /tmp/praktika
          mkdir -p /tmp/praktika /tmp/praktika/input /tmp/praktika/output /tmp/praktika/results
          echo "TEMP_DIR=$(readlink -f /tmp/praktika)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f /tmp/praktika/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f /tmp/praktika/output)" >> "$GITHUB_ENV"
          echo "JOB_NAME=Config Workflow" >> "$GITHUB_ENV"
          export PYTHONPATH=$(pwd)
          echo PYTHONPATH=$PYTHONPATH >> "$GITHUB_ENV"
          export GH_APP_ID="${{ secrets.GH_APP_ID }}"
          cat >> "$GITHUB_ENV" << 'EOF'
          GH_APP_ID<<MULTILINE_SECRET_SUPPORT
          ${{ secrets.GH_APP_ID }}
          MULTILINE_SECRET_SUPPORT
          EOF
          export GH_APP_PEM_KEY="${{ secrets.GH_APP_PEM_KEY }}"
          cat >> "$GITHUB_ENV" << 'EOF'
          GH_APP_PEM_KEY<<MULTILINE_SECRET_SUPPORT
          ${{ secrets.GH_APP_PEM_KEY }}
          MULTILINE_SECRET_SUPPORT
          EOF
          python3 -m praktika.gh_auth "Example Push trigger, HTML"
          echo '''${{ needs.config_workflow.outputs.data }}''' > /tmp/praktika/results/workflow_config_example_push_trigger_html.json
          cat /tmp/praktika/results/workflow_config_example_push_trigger_html.json
          echo "::group::GITHUB ENV"
          env | grep GITHUB ||:
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:
          echo "::endgroup::"
          echo "::group::CI ENV"
          env | grep CI_ ||:
          echo "::endgroup::"
          echo "::group::GH ENV"
          env | grep GH_ ||:
          echo "::endgroup::"
          cat > /tmp/workflow_status.json << 'EOF'
          ${ toJson(needs) }
          EOF
          echo "PRAKTIKA_SETUP_STEP_EXIT_CODE=0" >> "$GITHUB_ENV"

      - name: Pre
        run: |
          set -o pipefail
          python3 -m praktika.runner --pre-run --job-name '''Config Workflow''' --workflow-name "Example Push trigger, HTML" 2>&1 | tee /tmp/praktika/pre_run.log

      - name: Run
        id: run
        run: |
          set -o pipefail
          python3 -m praktika.runner --run --job-name '''Config Workflow''' --workflow-name "Example Push trigger, HTML" 2>&1 | tee /tmp/praktika/run.log

      - name: Post
        if: ${{ !cancelled() }}
        run: |
          set -o pipefail
          python3 -m praktika.runner --post-run --job-name '''Config Workflow''' --workflow-name "Example Push trigger, HTML" 2>&1 | tee /tmp/praktika/post_run.log

  job_1:
    runs-on: [maxs-small-fixed]
    needs: [config_workflow]
    name: "Job 1"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
    steps:
      - name: Checkout code
