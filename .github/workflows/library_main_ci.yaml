name: Library Main CI

on:
  push:
    branches:
      - main

jobs:

  unit_tests:
    runs-on: [ubuntu-latest]
    needs: []
    name: Unit Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up env
        run: |
          rm -rf ~/lh_ci/input ~/lh_ci/output ~/lh_ci
          mkdir -p ~/lh_ci ~/lh_ci/input ~/lh_ci/output
          echo "TEMP_DIR=$(readlink -f ~/lh_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f ~/lh_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f ~/lh_ci/output)" >> "$GITHUB_ENV"
          env | grep GITHUB

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          #pip install recurcipy

      - name: Pre
        run: |
          python -m recurcipy.runner --pre-run --job-name "Unit Tests" --workflow-name "Library Main CI"

      - name: Run
        run: |
          python -m recurcipy.runner --run --job-name "Unit Tests" --workflow-name "Library Main CI"

      - name: Post
        run: |
          python -m recurcipy.runner --post-run --job-name "Unit Tests" --workflow-name "Library Main CI"

  yaml_lint:
    runs-on: [ubuntu-latest]
    needs: []
    name: Yaml Lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up env
        run: |
          rm -rf ~/lh_ci/input ~/lh_ci/output ~/lh_ci
          mkdir -p ~/lh_ci ~/lh_ci/input ~/lh_ci/output
          echo "TEMP_DIR=$(readlink -f ~/lh_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f ~/lh_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f ~/lh_ci/output)" >> "$GITHUB_ENV"
          env | grep GITHUB

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          #pip install recurcipy

      - name: Pre
        run: |
          python -m recurcipy.runner --pre-run --job-name "Yaml Lint" --workflow-name "Library Main CI"

      - name: Run
        run: |
          python -m recurcipy.runner --run --job-name "Yaml Lint" --workflow-name "Library Main CI"

      - name: Post
        run: |
          python -m recurcipy.runner --post-run --job-name "Yaml Lint" --workflow-name "Library Main CI"
