name: Example On Push Trigger

on:
  push:
    branches: ['**']

jobs:

  job_a:
    runs-on: [ubuntu-latest]
    needs: []
    name: Job A
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up env
        run: |
          rm -rf ~/tmp_ci/input ~/tmp_ci/output ~/tmp_ci
          mkdir -p ~/tmp_ci ~/tmp_ci/input ~/tmp_ci/output
          echo "TEMP_DIR=$(readlink -f ~/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f ~/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f ~/tmp_ci/output)" >> "$GITHUB_ENV"
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          #pip install recurcipy

      - name: Pre
        run: |
          python -m recurcipy.runner --pre-run --job-name "Job A" --workflow-name "Example On Push Trigger"

      - name: Run
        run: |
          python -m recurcipy.runner --run --job-name "Job A" --workflow-name "Example On Push Trigger"

      - name: Post
        run: |
          python -m recurcipy.runner --post-run --job-name "Job A" --workflow-name "Example On Push Trigger"

  job_b:
    runs-on: [ubuntu-latest]
    needs: [job_a]
    name: Job B
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up env
        run: |
          rm -rf ~/tmp_ci/input ~/tmp_ci/output ~/tmp_ci
          mkdir -p ~/tmp_ci ~/tmp_ci/input ~/tmp_ci/output
          echo "TEMP_DIR=$(readlink -f ~/tmp_ci)" >> "$GITHUB_ENV"
          echo "INPUT_DIR=$(readlink -f ~/tmp_ci/input)" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$(readlink -f ~/tmp_ci/output)" >> "$GITHUB_ENV"
          env | grep GITHUB
          env | grep -q GITHUB_EVENT_PATH && cat "$GITHUB_EVENT_PATH" ||:

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          #pip install recurcipy

      - name: Pre
        run: |
          python -m recurcipy.runner --pre-run --job-name "Job B" --workflow-name "Example On Push Trigger"

      - name: Run
        run: |
          python -m recurcipy.runner --run --job-name "Job B" --workflow-name "Example On Push Trigger"

      - name: Post
        run: |
          python -m recurcipy.runner --post-run --job-name "Job B" --workflow-name "Example On Push Trigger"
